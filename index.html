<script>
    // 1. NAVEGACIÓ ENTRE PÀGINES
    function showPage(pageId) {
        document.querySelectorAll('.page-content').forEach(page => {
            page.classList.add('hidden');
        });
        document.getElementById('page-' + pageId).classList.remove('hidden');
        
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.remove('text-blue-600', 'border-b-2', 'border-blue-600');
            btn.classList.add('text-slate-500');
        });
        
        const activeBtn = document.getElementById('btn-' + pageId);
        if(activeBtn) {
            activeBtn.classList.remove('text-slate-500');
            activeBtn.classList.add('text-blue-600', 'border-b-2', 'border-blue-600');
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.addEventListener('DOMContentLoaded', () => {
        showPage('inici');

        // 2. SUBTÍTOLS DEL VÍDEO PRINCIPAL
        const vttContent = `WEBVTT

00:00:06.000 --> 00:00:11.000
Premeu el botó de posició d'agulla per pujar l'agulla i el tira-fils.

00:00:12.000 --> 00:00:18.000
A la pantalla tàctil, premeu la tecla del cadenat per bloquejar la màquina.

00:00:22.000 --> 00:00:31.000
Col·loqueu el rodet de fil al passador horitzontal i tireu del fil cap a vosaltres.

00:00:32.000 --> 00:00:42.000
Inseriu el tap de bobina de la mida correcta i premeu-lo fermament.

00:00:43.000 --> 00:00:51.000
Estireu el fil per començar el recorregut per la part superior.

00:00:52.000 --> 00:00:58.000
Passeu el fil per sota de la primera guia superior de l'esquerra fins que faci clic.

00:00:59.000 --> 00:01:05.000
Baixeu el fil directament pel canal vertical dret, marcat amb el número 2.

00:01:06.000 --> 00:01:11.000
A la part inferior, feu el gir en "U" seguint el número 3 i pugeu.

00:01:12.000 --> 00:01:18.000
Passeu el fil de dreta a esquerra per l'ull de la palanca tira-fils metàl·lica i baixeu de nou.

00:01:19.000 --> 00:01:26.000
A la zona de l'agulla, enganxeu el fil a la guia metàl·lica número 6.

00:01:28.000 --> 00:01:35.000
Baixeu la palanca del prensateles. Això bloqueja la tensió del fil.

00:01:36.000 --> 00:01:42.000
Passeu el fil per les guies de l'enfilador preparant l'últim pas.

00:01:43.000 --> 00:01:52.000
Passeu el fil completament per l'enfilador (7) i talleu l'excés a la fulla del costat esquerre.

00:01:56.000 --> 00:02:05.000
Baixeu completament la palanca de l'enfilador i allibereu-la suaument perquè passi el fil, formant un bucle.`;

        const blob = new Blob([vttContent], { type: 'text/vtt' });
        const trackUrl = URL.createObjectURL(blob);
        const mainVideo = document.getElementById('main-tutorial-video');
        if (mainVideo) {
            const track = document.createElement('track');
            track.kind = 'subtitles';
            track.label = 'Català';
            track.srclang = 'ca';
            track.default = true;
            track.src = trackUrl;
            mainVideo.appendChild(track);
        }

        // 3. BUCLE DE 3 SEGONS (VÍDEOS LOCALS - ESTIL GIF)
        const videosPasAPas = document.querySelectorAll('.step-card video');

        videosPasAPas.forEach(video => {
            // Llegim el segon d'inici de l'atribut src (ex: video.mp4#t=26)
            const src = video.getAttribute('src');
            let inici = 0;
            
            if (src && src.includes('#t=')) {
                inici = parseFloat(src.split('#t='));
            }

            const final = inici + 3;

            // En ordinadors podem forçar el mute i el play immediatament
            video.muted = true;
            video.currentTime = inici;

            // Escoltador d'esdeveniment per fer el bucle
            video.addEventListener('timeupdate', function() {
                if (this.currentTime >= final) {
                    this.currentTime = inici;
                }
            });

            // Ens assegurem que el vídeo es reprodueixi
            video.play();
        });
    });
</script>
